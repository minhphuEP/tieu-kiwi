# CDM Component → CodeUnit map (FE + BE)
#
# Format: <Component ref>: list of glob patterns (relative to repo root of samx-cdm).
#
# Ingest resolves each glob against graph.json source_files, creates:
#   Component -implementedBy-> CodeUnit
# edges for every matched file.
#
# Rules:
#   - Match order = declaration order below. First-match-wins for a file.
#     → put SPECIFIC globs BEFORE broad ones.
#     → put SPECIFIC Components (FOOTAGE-FLOW, SAMPLE-TRACKING) BEFORE broad
#       ones (OFFER-REVIEWER's `apps/offers/**` glob).
#   - Test files (*.test.tsx/*.test.ts) EXCLUDED at FE ingest time.
#     BE `**/tests/**` and `test_*.py` also excluded via excluded_globs.
#   - Cross-cutting infra (hooks/, lib/, shared/, media/, notifications/,
#     common/, external/, config/, migrations/, __init__.py, etc.) NOT mapped.
#   - `overrides:` at bottom for per-file reassignment (specific > glob).
#
# Draft 2026-07-09 — FE + BE ingested from same commit c9e0f277.

