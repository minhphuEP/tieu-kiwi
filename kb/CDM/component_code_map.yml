# CDM Component → CodeUnit map (FE only, this iteration)
#
# Format: <Component ref>: list of glob patterns (relative to repo root of samx-cdm).
#
# Ingest resolves each glob against graph.json source_files, creates:
#   Component -implementedBy-> CodeUnit
# edges for every matched file.
#
# Rules:
#   - Match order = declaration order below. First-match-wins for a file.
#     → put SPECIFIC globs BEFORE broad ones.
#   - Test files (*.test.tsx/*.test.ts) currently EXCLUDED at ingest time
#     (per user decision — see plan). Add later if needed.
#   - Cross-cutting infra (hooks/, lib/, shared/, shell/, main.tsx, vite-env, scss.d)
#     are NOT mapped to any Component. Left uncovered by design.
#   - If a file matches ZERO Components, dry-run will flag it — user reviews.
#
# Draft 2026-07-09 — REVIEW BEFORE INGEST.

