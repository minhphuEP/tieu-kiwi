# ---------------------------------------------------------------------------
# Files explicitly NOT mapped to any Component (cross-cutting infra).
# Excluded to reduce dry-run "unmapped" noise. Not a hard exclude — just for
# reporting.
# ---------------------------------------------------------------------------
excluded_globs:
  - "**/hooks/**"
  - "**/lib/**"
  - "**/shared/**"
  - "**/shell/**"
  - "**/main.tsx"
  - "**/scss.d.ts"
  - "**/vite-env.d.ts"
  - "**/app/routes/__root.tsx"                                  # tanstack-router shell root
  - frontend/apps/reviewer/src/app/routes/index.tsx             # reviewer landing (redirects to dashboard)
  # Build / config / package files (top-level per-app, not under src/)
  - "**/package.json"
  - "**/tsconfig.json"
  - "**/tsconfig.*.json"
  - "**/vercel.json"
  - "**/vite.config.ts"
  - "**/vite.config.js"
  - "**/vitest.config.ts"
  - "**/vitest.setup.ts"
  # Cross-cutting UI atoms — not features:
  - frontend/apps/creator/src/components/limited-text-input.tsx
  - frontend/apps/creator/src/components/locale/**
  - frontend/apps/creator/src/components/location-selects.tsx
